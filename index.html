<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>温州肯恩大学 融媒体大屏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family: "Microsoft YaHei",sans-serif}
body{background:#0b1220;color:#fff;padding:20px}
.header{text-align:center;padding:20px 0;font-size:32px;color:#409eff}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:1400px;margin:0 auto}
.card{background:#161d2f;border-radius:10px;padding:20px}
.card-title{font-size:20px;margin-bottom:15px;color:#67c2ff;border-left:4px solid #409eff;padding-left:10px}
.item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #2a3347}
.num{color:#f56c6c;font-weight:bold}
</style>
</head>
<body>
<div class="header">温州肯恩大学 融媒体大屏</div>
<div class="grid">
<div class="card">
<div class="card-title">微博公开数据</div>
<div class="item">粉丝数 <span class="num" id="wb_fans">加载中</span></div>
<div class="item">博文数 <span class="num" id="wb_post">加载中</span></div>
</div>

<div class="card">
<div class="card-title">抖音公开数据</div>
<div class="item">粉丝数 <span class="num" id="dy_fans">加载中</span></div>
<div class="item">获赞数 <span class="num" id="dy_like">加载中</span></div>
<div class="item">作品数 <span class="num" id="dy_video">加载中</span></div>
</div>

<div class="card">
<div class="card-title">更新状态</div>
<div class="item">最后刷新 <span class="num" id="time">--</span></div>
</div>
</div>

<script>
async function fetchData() {
  try {
    // 微博公开数据抓取
    const wb = await fetch("https://api.allorigins.win/get?url=https://weibo.com/u/2618515572");
    const wbData = await wb.json();
    const wbHtml = wbData.contents;
    
    let wbFans = "未获取";
    let wbPost = "未获取";
    try {
      wbFans = wbHtml.match(/"followers_count":"?(\d+)"?/)?.[1] || "未获取";
      wbPost = wbHtml.match(/"statuses_count":"?(\d+)"?/)?.[1] || "未获取";
    } catch(e){}

    // 抖音公开数据抓取
    const dy = await fetch("https://api.allorigins.win/get?url=https://www.douyin.com/@wenzhoukean");
    const dyData = await dy.json();
    const dyHtml = dyData.contents;
    
    let dyFans = "未获取";
    let dyLike = "未获取";
    let dyVideo = "未获取";
    try {
      dyFans = dyHtml.match(/"fanCount":"?(\d+)"?/)?.[1] || "未获取";
      dyLike = dyHtml.match(/"likeCount":"?(\d+)"?/)?.[1] || "未获取";
      dyVideo = dyHtml.match(/"awemeCount":"?(\d+)"?/)?.[1] || "未获取";
    } catch(e){}

    // 渲染到页面
    document.getElementById("wb_fans").innerText = wbFans;
    document.getElementById("wb_post").innerText = wbPost;
    document.getElementById("dy_fans").innerText = dyFans;
    document.getElementById("dy_like").innerText = dyLike;
    document.getElementById("dy_video").innerText = dyVideo;
    document.getElementById("time").innerText = new Date().toLocaleString();
  } catch (e) {
    console.log("抓取中...")
  }
}

fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
